name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in all required fields.

  - type: input
    id: app_version
    attributes:
      label: App Version
      description: Found in Settings → About. e.g. `1.4.2 (312)`
      placeholder: "1.4.2 (312)"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: Model name of the device you are using. e.g. `iPhone 15 Pro`, `iPad Air 5`, `Apple TV 4K (3rd gen)`
      placeholder: "iPhone 15 Pro"
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS Version
      description: iOS / iPadOS / tvOS version. e.g. `iOS 17.4`
      placeholder: "iOS 17.4"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "What happened?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Open the app
        2. Navigate to ...
        3. Tap on ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      placeholder: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      placeholder: "What actually happened?"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: |
        **Please include a screenshot if at all possible — it dramatically speeds up diagnosis.**

        For video playback bugs (wrong video loading, buffering, quality issues), enable **Stats for Nerds** before screenshotting:
        - In the player, long-press (iOS/iPadOS) or press and hold Select (tvOS) to open the stats overlay.
        - The overlay shows the **Video ID**, bitrate, codec, resolution, and any error code — this is the ground truth for what the player actually loaded, regardless of what the UI title shows.
        - Include one screenshot per play attempt if the issue reproduces across multiple taps.

        Drag and drop images directly into this box, or paste from clipboard.
      placeholder: "Drag & drop screenshots here..."
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might be relevant (e.g. specific video URL, network conditions).
    validations:
      required: false
